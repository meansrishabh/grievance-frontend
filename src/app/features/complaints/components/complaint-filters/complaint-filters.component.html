<section class="rounded-md border border-line bg-white p-4 shadow-panel" [formGroup]="form">
  <div class="flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
    <div class="grid flex-1 grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-4">
      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-ink">Status</span>
        <select formControlName="status" class="h-10 w-full rounded-md border border-line bg-white px-3 text-sm text-ink outline-none focus:border-gov-500 focus:ring-2 focus:ring-gov-100">
          <option value="">All Status</option>
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Resolved">Resolved</option>
        </select>
      </label>

      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-ink">Department</span>
        <select formControlName="department" class="h-10 w-full rounded-md border border-line bg-white px-3 text-sm text-ink outline-none focus:border-gov-500 focus:ring-2 focus:ring-gov-100">
          <option value="">All Departments</option>
          @for (department of departments; track department) {
            <option [value]="department">{{ department }}</option>
          }
        </select>
      </label>

      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-ink">From Date</span>
        <input formControlName="fromDate" type="date" class="h-10 w-full rounded-md border border-line bg-white px-3 text-sm text-ink outline-none focus:border-gov-500 focus:ring-2 focus:ring-gov-100" />
      </label>

      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-ink">Search</span>
        <div class="flex h-10 items-center gap-2 rounded-md border border-line bg-white px-3 focus-within:border-gov-500 focus-within:ring-2 focus-within:ring-gov-100">
          <lucide-icon [img]="icons.search" class="h-4 w-4 text-muted"></lucide-icon>
          <input formControlName="search" class="w-full bg-transparent text-sm outline-none placeholder:text-slate-400" placeholder="GRV ID or mobile" />
        </div>
      </label>
    </div>

    <div class="flex gap-2">
      <app-ui-button variant="secondary" (click)="apply()">
        <lucide-icon [img]="icons.filter" class="h-4 w-4"></lucide-icon>
        Apply
      </app-ui-button>
      <app-ui-button variant="ghost" (click)="reset()">Reset</app-ui-button>
    </div>
  </div>
</section>
